<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦅 Early Eagles — Gallery</title>
<meta name="description" content="Browse all minted Early Eagles — 210 fully on-chain NFTs on the Stacks blockchain.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* ── Reset & Root ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:        #d4a84b;
  --gold-light:  #e8c26a;
  --gold-dim:    rgba(212,168,75,0.15);
  --gold-glow:   rgba(212,168,75,0.3);
  --navy:        #0d1117;
  --navy-mid:    #131a24;
  --navy-light:  #1a2433;
  --surface:     #0f1520;
  --surface2:    #161f2e;
  --border:      rgba(212,168,75,0.18);
  --border-sub:  rgba(255,255,255,0.07);
  --text:        #e8eaf0;
  --text-muted:  #8892a4;
  --text-dim:    #4a5568;
  --green:       #00ff88;
  --radius:      12px;
  --radius-sm:   8px;
  --transition:  0.2s ease;
}

html { scroll-behavior: smooth; }

body {
  background: var(--navy);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
}

h1, h2, h3, h4 { font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 0.02em; }

/* ── Layout ── */
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 15px;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 11px 24px; border-radius: var(--radius-sm);
  border: none; cursor: pointer; text-decoration: none;
  transition: all var(--transition); white-space: nowrap;
}
.btn-primary {
  background: var(--gold); color: #0d1117;
  box-shadow: 0 0 20px rgba(212,168,75,0.3);
}
.btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 4px 30px rgba(212,168,75,0.5); }
.btn-ghost {
  background: transparent; color: var(--gold);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--gold-dim); transform: translateY(-2px); }
.btn-sm { padding: 8px 16px; font-size: 12px; }

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-sub);
  padding: 14px 0;
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.nav-brand {
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: 20px; color: var(--gold); text-decoration: none;
  display: flex; align-items: center; gap: 8px;
}
.nav-right { display: flex; align-items: center; gap: 10px; }

/* ── Page header ── */
.page-header {
  position: relative; overflow: hidden;
  padding: 60px 0 40px; text-align: center;
}
#matrix-canvas {
  position: absolute; inset: 0; opacity: 0.1; pointer-events: none;
}
.page-header-inner { position: relative; z-index: 2; }
.gallery-label {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: 3px; text-transform: uppercase; color: var(--gold);
  background: var(--gold-dim); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px; margin-bottom: 16px;
}
.page-title {
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: clamp(2.4rem, 6vw, 4rem);
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 60%, #a07830 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1; margin-bottom: 14px; letter-spacing: -0.01em;
}
.page-subtitle {
  font-size: 15px; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center; gap: 16px;
  flex-wrap: wrap;
}
.page-subtitle strong { color: var(--text); font-weight: 600; }
.stat-sep { color: var(--text-dim); }
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 7px var(--green); flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.5; transform:scale(0.85); } }

/* ── Filter bar ── */
.filter-bar {
  padding: 20px 0;
  border-bottom: 1px solid var(--border-sub);
  position: sticky; top: 57px; z-index: 90;
  background: rgba(13,17,23,0.95); backdrop-filter: blur(8px);
}
.filter-inner {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.filter-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 7px 16px; border-radius: 20px; border: none; cursor: pointer;
  background: var(--surface2); border: 1px solid var(--border-sub);
  color: var(--text-muted); transition: all var(--transition);
}
.filter-pill:hover { border-color: var(--border); color: var(--text); }
.filter-pill.active {
  background: var(--gold-dim); border-color: var(--border);
  color: var(--gold);
}
.filter-pill[data-tier="legendary"].active { color: var(--gold); border-color: rgba(212,168,75,0.5); background: rgba(212,168,75,0.12); }
.filter-pill[data-tier="epic"].active      { color: #c084fc; border-color: rgba(160,80,255,0.4); background: rgba(160,80,255,0.1); }
.filter-pill[data-tier="rare"].active      { color: #7dd3fc; border-color: rgba(56,189,248,0.4); background: rgba(56,189,248,0.1); }
.filter-pill[data-tier="uncommon"].active  { color: #6ee7b7; border-color: rgba(52,211,153,0.4); background: rgba(52,211,153,0.1); }
.filter-pill[data-tier="common"].active    { color: #9ca3af; border-color: rgba(156,163,175,0.35); background: rgba(156,163,175,0.08); }

.filter-count {
  font-size: 11px; padding: 1px 6px; border-radius: 8px;
  background: rgba(255,255,255,0.08); color: var(--text-dim);
}

/* ── Gallery Grid ── */
.gallery-section { padding: 32px 0 60px; }

.eagles-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
@media (max-width: 1100px) { .eagles-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 760px)  { .eagles-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } }
@media (max-width: 480px)  { .eagles-grid { grid-template-columns: 1fr; gap: 14px; } }

/* ── Eagle Card ── */
.eagle-card {
  background: var(--surface);
  border: 1px solid var(--border-sub);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
  opacity: 0;
  transform: translateY(16px);
  animation: cardIn 0.4s ease forwards;
}
.eagle-card:hover {
  border-color: var(--border);
  transform: translateY(-4px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.eagle-card.tier-legendary {
  border-color: rgba(212,168,75,0.35);
  box-shadow: 0 0 20px rgba(212,168,75,0.1);
}
.eagle-card.tier-legendary:hover {
  border-color: rgba(212,168,75,0.6);
  box-shadow: 0 0 40px rgba(212,168,75,0.2), 0 8px 32px rgba(0,0,0,0.4);
}

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

/* iframe container — 340×480 scaled to fit card width */
.card-iframe-wrap {
  position: relative;
  width: 100%;
  /* 340:480 = 0.708 aspect ratio */
  padding-bottom: calc(480 / 340 * 100%);
  background: #0a0e18;
  overflow: hidden;
}
.card-iframe-wrap iframe {
  position: absolute;
  top: 0; left: 0;
  width: 340px;
  height: 480px;
  border: none;
  transform-origin: top left;
  /* scale is set via JS based on rendered width */
}
.card-iframe-wrap .iframe-loader {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #0a0e18;
  z-index: 2; transition: opacity 0.3s ease;
}
.card-iframe-wrap .iframe-loader.hidden { opacity: 0; pointer-events: none; }

/* Listing hover badge — floats over card bottom-right on hover */
.listing-badge {
  position: absolute;
  bottom: 12px; right: 12px;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.2s ease, transform 0.2s ease;
  pointer-events: none;
  z-index: 10;
}
.eagle-card:hover .listing-badge { opacity: 1; transform: translateY(0); }

.listing-badge-inner {
  display: inline-flex; align-items: center; gap: 5px;
  backdrop-filter: blur(12px);
  border-radius: 20px; padding: 4px 10px;
  font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600;
  letter-spacing: 0.04em; white-space: nowrap;
}
.listing-badge-inner.not-listed {
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4);
}
.listing-badge-inner.not-listed::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.2); flex-shrink: 0;
}
.listing-badge-inner.for-sale {
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(212,168,75,0.5);
  color: #d4a84b;
}
.listing-badge-inner.for-sale-sbtc {
  border-color: rgba(247,147,26,0.5);
  color: #f7931a;
}

/* ── Skeleton Cards ── */
.skeleton-card {
  background: var(--surface);
  border: 1px solid var(--border-sub);
  border-radius: var(--radius);
  overflow: hidden;
}
.skeleton-iframe {
  width: 100%;
  padding-bottom: calc(480 / 340 * 100%);
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease-in-out infinite;
  position: relative;
}
.skeleton-info { padding: 14px 16px 16px; }
.skeleton-line {
  height: 14px; border-radius: 6px; margin-bottom: 10px;
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease-in-out infinite;
}
.skeleton-line.short { width: 55%; }
.skeleton-line.thin  { height: 10px; }
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 100px 24px; grid-column: 1/-1;
}
.empty-eagle { font-size: 64px; margin-bottom: 20px; display: block; opacity: 0.5; }
.empty-state h3 {
  font-size: 1.6rem; color: var(--text-muted); margin-bottom: 12px;
}
.empty-state p { color: var(--text-dim); font-size: 14px; margin-bottom: 28px; }

/* ── Error state ── */
.error-banner {
  background: rgba(255,77,106,0.08); border: 1px solid rgba(255,77,106,0.25);
  border-radius: var(--radius-sm); padding: 16px 20px;
  margin-bottom: 24px; display: none;
  font-size: 14px; color: #ff8a9a;
}

/* ── Refresh indicator ── */
.refresh-bar {
  display: flex; align-items: center; justify-content: flex-end; gap: 8px;
  margin-bottom: 20px;
}
.refresh-text {
  font-size: 12px; color: var(--text-dim);
  font-family: 'Rajdhani', sans-serif; letter-spacing: 0.04em;
}
.refresh-btn {
  background: none; border: 1px solid var(--border-sub);
  color: var(--text-dim); font-size: 12px; padding: 4px 12px;
  border-radius: 6px; cursor: pointer; font-family: 'Inter', sans-serif;
  transition: all var(--transition);
}
.refresh-btn:hover { border-color: var(--border); color: var(--gold); }
.refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── No results (filtered) ── */
.no-results {
  text-align: center; padding: 60px 24px; grid-column: 1/-1;
  color: var(--text-dim); font-size: 14px;
}

@media (max-width: 640px) {
  .filter-bar { top: 52px; }
  nav { padding: 10px 0; }
}
</style>
</head>

<script>
/* ── CONFIG ── */
const CONFIG = {
  contractAddress:  'ST3HR09GX5YFDPP7271GG1Y9P4ZZ70DRE7H2AYYEM',
  rendererAddress:  'ST3HR09GX5YFDPP7271GG1Y9P4ZZ70DRE7H2AYYEM',
  rendererName:     'early-eagles-renderer-v8',
  contractName:    'early-eagles',
  stacksApiUrl:    'https://api.testnet.hiro.so',
  explorerBase:    'https://explorer.hiro.so',
  network:         'testnet',
};

const TOTAL_SUPPLY = 210;
// Contract tier IDs: 0=Legendary, 1=Epic, 2=Rare, 3=Uncommon, 4=Common
const TIER_NAMES   = ['Legendary', 'Epic', 'Rare', 'Uncommon', 'Common'];
const TIER_IDS     = ['legendary', 'epic', 'rare', 'uncommon', 'common'];

/* ── State ── */
let eaglesData     = [];      // [{id, name, tier, tierName, tierId, owner, html}]
let activeFilter   = 'all';
let refreshTimer   = null;
let isLoading      = false;

/* ── Matrix Background ── */
(function initMatrix() {
  const canvas = document.getElementById('matrix-canvas');
  const ctx    = canvas.getContext('2d');
  let cols, drops;

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    cols  = Math.floor(canvas.width / 16);
    drops = Array.from({ length: cols }, () => Math.random() * -100);
  }

  function draw() {
    ctx.fillStyle = 'rgba(13,17,23,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#d4a84b';
    ctx.font = '13px monospace';
    const chars = 'アイウエオカキクケコ0123456789ABCDEF🦅⚡';
    for (let i = 0; i < drops.length; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(ch, i * 16, drops[i] * 16);
      if (drops[i] * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i] += 0.4;
    }
  }

  resize();
  window.addEventListener('resize', resize);
  setInterval(draw, 60);
})();

/* ── Encode uint for Clarity ── */
function encodeUint(n) {
  // 0x01 + 32-byte big-endian
  const hex = n.toString(16).padStart(32, '0');
  return '0x01' + hex;
}

/* ── Decode Clarity result hex to string ── */
function decodeTokenUri(hexResult) {
  const hex = hexResult.startsWith('0x') ? hexResult.slice(2) : hexResult;
  // ok(07) + some(0a) + string-type(09 or 0d) = 3 bytes = 6 hex chars
  const afterType = hex.slice(6);
  const len = parseInt(afterType.slice(0, 8), 16);
  const strHex = afterType.slice(8, 8 + len * 2);
  const bytes = strHex.match(/.{2}/g) || [];
  return bytes.map(b => parseInt(b, 16)).reduce((acc, c) => acc + String.fromCharCode(c), '');
}

/* Decode clarity result that wraps (ok (some (string-ascii ...))) same structure for render-params and owner */
function decodeClarityString(hexResult) {
  try {
    return decodeTokenUri(hexResult);
  } catch (e) {
    return null;
  }
}

/* Decode owner: (ok (some (principal ...))) */
function decodeOwner(hexResult) {
  try {
    const hex = hexResult.startsWith('0x') ? hexResult.slice(2) : hexResult;
    // 07 = ok, 0a = some, 05 = principal
    // 05 + 1 byte version + 20 bytes hash + optional contract name
    if (!hex.startsWith('070a05')) return null;
    const payload = hex.slice(6); // after ok+some+principal-type
    // version byte
    const version = parseInt(payload.slice(0, 2), 16);
    // 20 bytes hash160
    const hashHex = payload.slice(2, 42);
    // Encode back to C32 (testnet = 26 → ST, mainnet = 22 → SP)
    return c32encode(version, hashHex);
  } catch (e) {
    return null;
  }
}

/* ── Minimal C32 encoder (for Stacks address display) ── */
const C32_ALPHABET = '0123456789ABCDEFGHJKMNPQRSTVWXYZ';
function c32encode(version, hashHex) {
  // We just produce a display string from the hash for abbreviation purposes
  // Full c32check would need a checksum — for display we abbreviate hash directly
  return 'ST' + hashHex.toUpperCase().slice(0, 6) + '…' + hashHex.toUpperCase().slice(-4);
}

function abbreviateAddress(addr) {
  if (!addr || addr.length < 12) return addr;
  return addr.slice(0, 8) + '…' + addr.slice(-4);
}

/* ── API call helper ── */
/* ── Renderer segment cache ── */
let _rendererSegments = null;
async function getRendererSegments() {
  if (_rendererSegments) return _rendererSegments;
  function decodeSegment(d, fn) {
    if (!d.okay) throw new Error('renderer '+fn+' failed');
    let hex = d.result.replace('0x','');
    if (hex.startsWith('07')) hex = hex.slice(2);
    if (hex.startsWith('0d') || hex.startsWith('09')) hex = hex.slice(2);
    const len = parseInt(hex.slice(0,8),16);
    const strHex = hex.slice(8, 8+len*2);
    return (strHex.match(/.{2}/g)||[]).map(b=>parseInt(b,16)).reduce((a,c)=>a+String.fromCharCode(c),'');
  }
  // Load segments sequentially to avoid rate limits
  const seg1  = decodeSegment(await callReadRenderer('get-seg1'),  'get-seg1');
  const eagle = decodeSegment(await callReadRenderer('get-eagle'), 'get-eagle');
  const seg2  = decodeSegment(await callReadRenderer('get-seg2'),  'get-seg2');
  const seg3  = decodeSegment(await callReadRenderer('get-seg3'),  'get-seg3');
  _rendererSegments = { seg1, eagle, seg2, seg3 };
  return _rendererSegments;
}

async function callRead(fn, args, retries=4) {
  const url = `${CONFIG.stacksApiUrl}/v2/contracts/call-read/${CONFIG.contractAddress}/${CONFIG.contractName}/${fn}`;
  for (let attempt = 0; attempt <= retries; attempt++) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sender: CONFIG.contractAddress, arguments: args }),
    });
    if (res.status === 429) {
      const wait = attempt === 0 ? 15000 : 30000 * attempt;
      console.log(`Rate limited on ${fn}, waiting ${wait/1000}s...`);
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    if (!res.ok) throw new Error(`API error ${res.status} for ${fn}`);
    return res.json();
  }
  throw new Error(`Max retries exceeded for ${fn}`);
}

async function callReadRenderer(fn, retries=4) {
  const url = `${CONFIG.stacksApiUrl}/v2/contracts/call-read/${CONFIG.rendererAddress}/${CONFIG.rendererName}/${fn}`;
  for (let attempt = 0; attempt <= retries; attempt++) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sender: CONFIG.rendererAddress, arguments: [] }),
    });
    if (res.status === 429) {
      const wait = attempt === 0 ? 15000 : 30000 * attempt;
      console.log(`Rate limited on renderer/${fn}, waiting ${wait/1000}s...`);
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    if (!res.ok) throw new Error(`API error ${res.status} for renderer/${fn}`);
    return res.json();
  }
  throw new Error(`Max retries exceeded for renderer/${fn}`);
}

/* ── Get total minted ── */
async function getTotalMinted() {
  const data = await callRead('get-last-token-id', []);
  if (!data.okay || !data.result) return 0;
  const hex = data.result.replace('0x', '');
  // result is (ok uint) = 0701 + 16-byte big-endian
  if (hex.length >= 34) {
    const valHex = hex.slice(hex.length - 32);
    return parseInt(valHex, 16) || 0;
  }
  return 0;
}

/* ── Fetch single eagle data ── */
async function fetchEagle(tokenId) {
  const uintArg = encodeUint(tokenId);

  const [paramsRes, ownerRes] = await Promise.allSettled([
    callRead('get-render-params', [uintArg]),
    callRead('get-owner',         [uintArg]),
  ]);
  // Note: get-render-params returns (ok string-utf8) directly — no 'some' wrapper
  // decode: 07(ok) + 0d(string-utf8) + 4-byte len + bytes
  function decodeRenderParams(hexResult) {
    const hex = (hexResult||'').replace('0x','').slice(4); // skip ok(07)+type(0d)
    const len = parseInt(hex.slice(0,8),16);
    const strHex = hex.slice(8, 8+len*2);
    return strHex.match(/.{2}/g).map(b=>parseInt(b,16)).reduce((a,c)=>a+String.fromCharCode(c),'');
  }

  let html  = null;
  let meta  = { name: `Eagle #${tokenId}`, tier: 0, cid: 0, rank: tokenId };
  let owner = null;

  // Assemble HTML from renderer segments + render-params (get-token-uri returns a URL, not data URI)
  if (paramsRes.status === 'fulfilled' && paramsRes.value.okay && paramsRes.value.result) {
    try {
      const jsonStr = decodeRenderParams(paramsRes.value.result);
      if (jsonStr) {
        const parsed = JSON.parse(jsonStr);
        meta = { ...meta, ...parsed };
        // Build the full card HTML from renderer segments
        const segs = await getRendererSegments();
        html = segs.seg1 + segs.eagle + segs.seg2 + jsonStr + segs.seg3;
      }
    } catch (e) { console.warn('render assemble failed:', e.message); }
  }

  // Decode owner
  if (ownerRes.status === 'fulfilled' && ownerRes.value.okay && ownerRes.value.result) {
    try {
      owner = decodeOwner(ownerRes.value.result);
    } catch (e) { /* skip */ }
  }

  const tierIdx  = typeof meta.tier === 'number' ? meta.tier : 0;
  const tierName = TIER_NAMES[tierIdx]  || 'Common';
  const tierId   = TIER_IDS[tierIdx]   || 'common';

  // Fetch live listing from contract
  let listing = null;
  try {
    const listRes = await callRead('get-listing', [uintArg]);
    const lhex = listRes.result;
    if (lhex && lhex !== '0x09') {
      // Decode (some (tuple {price: uint, currency: string-ascii, commission: principal}))
      // 0a = some, 0c = tuple
      const lh = lhex.replace('0x','');
      if (lh.startsWith('0a')) {
        // Extract currency string
        const curMatch = lhex.match(/0863757272656e6379([0-9a-f]+)/i);
        const priceMatch = lhex.match(/057072696365([0-9a-f]{34})/i);
        if (curMatch && priceMatch) {
          const curHex = curMatch[1];
          const curLen = parseInt(curHex.slice(2,10),16); // skip type(0d) + 4-byte len
          const curStr = curHex.slice(10, 10+curLen*2).match(/.{2}/g).map(b=>parseInt(b,16)).reduce((a,c)=>a+String.fromCharCode(c),'');
          const price = parseInt(priceMatch[1].slice(2), 16); // skip type byte 01
          const displayPrice = curStr === 'STX' ? (price/1_000_000).toFixed(2)+' STX' : (price/100_000_000).toFixed(8)+' sBTC';
          listing = { price: displayPrice, currency: curStr, raw: price };
        }
      }
    }
  } catch(e) { /* skip listing on error */ }

  return {
    id:       tokenId,
    name:     meta.name || `Eagle #${tokenId}`,
    tier:     tierIdx,
    tierName: tierName,
    tierId:   tierId,
    rank:     meta.rank || tokenId,
    cid:      meta.cid  || 0,
    owner:    owner,
    html:     html,
    listing:  listing,
  };
}

/* ── Render skeleton cards ── */
function renderSkeletons(count) {
  const grid = document.getElementById('eagles-grid');
  grid.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const sk = document.createElement('div');
    sk.className = 'skeleton-card';
    sk.innerHTML = `
      <div class="skeleton-iframe"></div>
      <div class="skeleton-info">
        <div class="skeleton-line"></div>
        <div class="skeleton-line short thin"></div>
      </div>`;
    grid.appendChild(sk);
  }
}

/* ── Build eagle card element ── */
function buildEagleCard(eagle, index) {
  const card = document.createElement('div');
  card.className = `eagle-card tier-${eagle.tierId}`;
  card.dataset.tier = eagle.tierId;
  card.style.animationDelay = `${Math.min(index * 60, 600)}ms`;

  const ownerDisplay = eagle.owner ? abbreviateAddress(eagle.owner) : 'Unknown';
  const explorerHref = eagle.owner
    ? `${CONFIG.explorerBase}/address/${eagle.owner}?chain=${CONFIG.network}`
    : '#';

  // Build listing hover badge
  const listingBadge = eagle.listing
    ? (() => {
        const isSbtc = eagle.listing.currency === 'SBTC' || eagle.listing.currency === 'sBTC';
        const icon = isSbtc ? '₿' : '◈';
        return `<div class="listing-badge"><span class="listing-badge-inner for-sale ${isSbtc ? 'for-sale-sbtc' : ''}">${icon} ${escHtml(String(eagle.listing.price))}</span></div>`;
      })()
    : `<div class="listing-badge"><span class="listing-badge-inner not-listed">Not listed</span></div>`;

  card.innerHTML = `
    <div class="card-iframe-wrap" id="wrap-${eagle.id}">
      <div class="iframe-loader" id="loader-${eagle.id}">
        <div style="text-align:center;">
          <div style="font-size:28px;margin-bottom:8px;opacity:0.4;">🦅</div>
          <div style="font-size:11px;color:var(--text-dim);font-family:Rajdhani,sans-serif;letter-spacing:0.05em;">Loading…</div>
        </div>
      </div>
    </div>
    ${listingBadge}`;

  // Inject iframe after element is attached (needs layout for scale calc)
  if (eagle.html) {
    requestAnimationFrame(() => {
      const wrap = card.querySelector('.card-iframe-wrap');
      if (!wrap) return;
      const iframe = document.createElement('iframe');
      iframe.setAttribute('scrolling', 'no');
      iframe.setAttribute('sandbox', 'allow-scripts');
      iframe.style.cssText = 'position:absolute;top:0;left:0;width:340px;height:480px;border:none;transform-origin:top left;';

      iframe.addEventListener('load', () => {
        // Scale iframe to fill wrapper width
        scaleIframe(iframe, wrap);
        const loader = card.querySelector(`#loader-${eagle.id}`);
        if (loader) loader.classList.add('hidden');
      });

      iframe.srcdoc = eagle.html;
      wrap.appendChild(iframe);

      // Observe resize
      if (window.ResizeObserver) {
        const ro = new ResizeObserver(() => scaleIframe(iframe, wrap));
        ro.observe(wrap);
      }
    });
  } else {
    // No HTML — show eagle icon placeholder
    const wrap = card.querySelector('.card-iframe-wrap');
    if (wrap) {
      const loader = card.querySelector(`#loader-${eagle.id}`);
      if (loader) {
        loader.innerHTML = `<div style="text-align:center;"><div style="font-size:40px;margin-bottom:8px;">🦅</div><div style="font-size:11px;color:var(--text-dim);font-family:Rajdhani,sans-serif;letter-spacing:0.05em;">#${eagle.id}</div></div>`;
      }
    }
  }

  return card;
}

function scaleIframe(iframe, wrap) {
  const wrapW = wrap.clientWidth;
  if (!wrapW) return;
  const scale = wrapW / 340;
  iframe.style.transform = `scale(${scale})`;
}

/* ── Render grid (with filter applied) ── */
function renderGrid() {
  const grid = document.getElementById('eagles-grid');
  grid.innerHTML = '';

  const filtered = activeFilter === 'all'
    ? eaglesData
    : eaglesData.filter(e => e.tierId === activeFilter);

  if (eaglesData.length === 0) {
    // Empty state
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <span class="empty-eagle">🦅</span>
      <h3>No eagles minted yet</h3>
      <p>Be the first Genesis AIBTC agent to claim your eagle.</p>
      <a class="btn btn-primary" href="/#mint">⚡ Mint My Eagle</a>`;
    grid.appendChild(empty);
    return;
  }

  if (filtered.length === 0) {
    const noRes = document.createElement('div');
    noRes.className = 'no-results';
    noRes.textContent = `No ${activeFilter} eagles minted yet.`;
    grid.appendChild(noRes);
    return;
  }

  filtered.forEach((eagle, idx) => {
    grid.appendChild(buildEagleCard(eagle, idx));
  });
}

/* ── Update filter counts ── */
function updateFilterCounts() {
  const counts = { all: eaglesData.length, legendary: 0, epic: 0, rare: 0, uncommon: 0, common: 0 };
  eaglesData.forEach(e => { if (counts[e.tierId] !== undefined) counts[e.tierId]++; });
  Object.entries(counts).forEach(([tier, cnt]) => {
    const el = document.getElementById(`count-${tier}`);
    if (el) el.textContent = cnt;
  });
}

/* ── Update header stats ── */
function updateHeaderStats(minted) {
  const statMinted    = document.getElementById('stat-minted');
  const statRemaining = document.getElementById('stat-remaining');
  if (statMinted)    statMinted.textContent    = minted;
  if (statRemaining) statRemaining.textContent = Math.max(0, TOTAL_SUPPLY - minted);
}

/* ── Show error banner ── */
function showError(msg) {
  const banner = document.getElementById('error-banner');
  if (banner) { banner.style.display = 'block'; banner.textContent = '⚠️ ' + msg; }
}

function hideError() {
  const banner = document.getElementById('error-banner');
  if (banner) { banner.style.display = 'none'; }
}

/* ── Main load ── */
async function loadGallery(manual) {
  if (isLoading) return;
  isLoading = true;
  hideError();

  const refreshBtn = document.getElementById('refresh-btn');
  if (refreshBtn) refreshBtn.classList.add('spinning');

  try {
    // Get total minted
    const minted = await getTotalMinted();
    updateHeaderStats(minted);

    if (minted === 0) {
      eaglesData = [];
      updateFilterCounts();
      renderGrid();
      return;
    }

    // Show skeletons if this is the initial load
    if (eaglesData.length === 0 || manual) {
      renderSkeletons(Math.min(minted, 8));
    }

    // Fetch eagles in small batches to avoid rate limits
    const BATCH = 3;
    const BATCH_DELAY = 1200; // ms between batches
    const ids = Array.from({ length: minted }, (_, i) => i);
    eaglesData = [];
    for (let i = 0; i < ids.length; i += BATCH) {
      const batch = ids.slice(i, i + BATCH);
      const results = await Promise.allSettled(batch.map(id => fetchEagle(id)));
      const loaded = results.map(r => r.status === 'fulfilled' ? r.value : null).filter(Boolean);
      eaglesData.push(...loaded);
      // Re-render after each batch so cards appear progressively
      updateFilterCounts();
      renderGrid();
      if (i + BATCH < ids.length) await new Promise(r => setTimeout(r, BATCH_DELAY));
    }

    updateFilterCounts();
    renderGrid();

    // Update refresh timestamp
    const refreshText = document.getElementById('refresh-text');
    if (refreshText) {
      const now = new Date();
      refreshText.textContent = `Last updated ${now.toLocaleTimeString()}`;
    }
  } catch (err) {
    showError('Failed to load gallery: ' + err.message);
    // If we have cached data, keep it; otherwise render empty
    if (eaglesData.length === 0) {
      document.getElementById('eagles-grid').innerHTML = '';
    }
  } finally {
    isLoading = false;
    if (refreshBtn) refreshBtn.classList.remove('spinning');
  }
}

/* ── Filter handler ── */
function setFilter(tier, el) {
  activeFilter = tier;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  renderGrid();
}

/* ── Escape HTML ── */
function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

/* ── Auto-refresh ── */
function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(async () => {
    await loadGallery(false);
    scheduleRefresh();
  }, 60000);
}

/* ── Init ── */
(async function init() {
  await loadGallery(false);
  scheduleRefresh();
})();
</script>
