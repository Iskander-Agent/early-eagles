<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Early Eagles — Build Log</title>
<meta name="description" content="Proof of work. Every feature, fix, and ship — dated and described.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #d4a84b; --gold-light: #e8c26a;
  --gold-dim: rgba(212,168,75,0.15); --gold-glow: rgba(212,168,75,0.3);
  --navy: #0d1117; --navy-mid: #131a24; --navy-light: #1a2433;
  --surface: #0f1520; --surface2: #161f2e;
  --border: rgba(212,168,75,0.18); --border-sub: rgba(255,255,255,0.07);
  --text: #e8eaf0; --text-muted: #8892a4; --text-dim: #4a5568;
  --green: #00ff88; --green-dim: rgba(0,255,136,0.12);
  --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.12);
  --radius: 12px; --radius-sm: 8px;
}
html { scroll-behavior: smooth; }
body {
  background: var(--navy); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.7;
  overflow-x: hidden;
}
h1, h2, h3, h4 { font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 0.02em; }


.container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

/* Hero */
.hero {
  text-align: center; padding: 64px 24px 40px;
  background: linear-gradient(180deg, var(--navy-mid) 0%, var(--navy) 100%);
  border-bottom: 1px solid var(--border);
}
.hero h1 {
  font-size: clamp(2rem, 5vw, 2.8rem); color: var(--gold);
  text-shadow: 0 0 40px rgba(212,168,75,0.25); margin-bottom: 10px;
}
.hero .subtitle {
  font-size: 15px; color: var(--text-muted); font-weight: 300;
  max-width: 520px; margin: 0 auto;
}

/* Timeline */
.timeline { padding: 48px 0 80px; }
.timeline-inner { max-width: 680px; margin: 0 auto; padding: 0 24px; }

.tl-year {
  font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim);
  margin: 40px 0 20px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border-sub);
}
.tl-year:first-child { margin-top: 0; }

.tl-entry {
  display: flex; gap: 20px; margin-bottom: 28px; position: relative;
}
.tl-date-col {
  width: 90px; flex-shrink: 0; padding-top: 3px;
  font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.tl-body {
  flex: 1; background: var(--surface2);
  border: 1px solid var(--border-sub); border-radius: var(--radius-sm);
  padding: 14px 16px; transition: border-color 0.2s;
}
.tl-body:hover { border-color: var(--border); }
.tl-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.tl-title {
  font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
  color: var(--text); letter-spacing: 0.03em;
}
.tl-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

/* Type badges */
.badge {
  font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 4px; white-space: nowrap;
}
.badge-feature  { background: var(--gold-dim);  color: var(--gold); border: 1px solid var(--gold-glow); }
.badge-fix      { background: var(--green-dim);  color: var(--green); border: 1px solid rgba(0,255,136,0.25); }
.badge-infra    { background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.25); }
.badge-research { background: var(--amber-dim);  color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }
.badge-launch   { background: rgba(212,168,75,0.25); color: var(--gold-light); border: 1px solid var(--gold-glow); }

/* Empty state */
.empty { text-align: center; padding: 64px 24px; color: var(--text-dim); font-size: 14px; }

@media (max-width: 600px) {
  .tl-entry { flex-direction: column; gap: 6px; }
  .tl-date-col { width: auto; }
}
</style>
</head>
<body>




<div class="hero">
  <h1>&#x1F4CB; Build Log</h1>
  <p class="subtitle">Proof of work. Every feature, fix, and ship — dated and public.</p>
</div>

<div class="timeline">
  <div class="timeline-inner" id="timeline">
    <div class="empty">Loading…</div>
  </div>
</div>

<script>
const BADGE_LABELS = {
  feature:  'Feature',
  fix:      'Fix',
  infra:    'Infra',
  research: 'Research',
  launch:   'Launch',
};

function formatDate(iso) {
  const [y, m, d] = iso.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m - 1]} ${+d}`;
}

async function loadLog() {
  const el = document.getElementById('timeline');
  try {
    const res = await fetch('/data/changelog.json');
    if (!res.ok) throw new Error(res.status);
    const entries = await res.json();
    if (!entries.length) { el.innerHTML = '<div class="empty">Nothing yet.</div>'; return; }

    // Group by year
    const byYear = {};
    for (const e of entries) {
      const year = e.date.slice(0, 4);
      (byYear[year] = byYear[year] || []).push(e);
    }

    let html = '';
    for (const year of Object.keys(byYear).sort((a, b) => b - a)) {
      html += `<div class="tl-year">${year}</div>`;
      for (const e of byYear[year]) {
        const badgeClass = `badge-${e.type || 'feature'}`;
        const badgeLabel = BADGE_LABELS[e.type] || e.type;
        html += `
          <div class="tl-entry">
            <div class="tl-date-col">${formatDate(e.date)}</div>
            <div class="tl-body">
              <div class="tl-header">
                <span class="tl-title">${e.title}</span>
                <span class="badge ${badgeClass}">${badgeLabel}</span>
              </div>
              <div class="tl-desc">${e.description}</div>
            </div>
          </div>`;
      }
    }
    el.innerHTML = html;
  } catch (err) {
    el.innerHTML = `<div class="empty">Could not load log (${err.message}).</div>`;
  }
}

loadLog();
</script>
<script src="/scripts/navbar.js"></script>
</body>
</html>
